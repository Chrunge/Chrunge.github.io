#################################################################
###################### NexT Configuration #######################
#################################################################
# See: https://theme-next.js.org/docs/

# ============================================================= #
# ============= Theme Core Configuration Settings ============= #
# ============================================================= #

# Allow to cache content generation.
cache:
  enable: true

# Remove unnecessary files after hexo generate.
minify: true

custom_file_path:
  head: source/_data/head.njk
  #header: source/_data/header.njk
  #sidebar: source/_data/sidebar.njk
  #postMeta: source/_data/post-meta.njk
  postBodyEnd: source/_data/post-body-end.njk
  footer: source/_data/footer.njk
  bodyEnd: source/_data/body-end.njk
  variable: source/_data/variables.styl
  mixin: source/_data/mixins.styl
  style: source/_data/styles.styl


# ============================================================= #
# ====================== Scheme Settings ====================== #
# ============================================================= #

# Schemes, 主题样式
scheme: Gemini
darkmode: true


# ============================================================= #
# ================= Site Information Settings ================= #
# ============================================================= #

favicon:
  small: /resources/favicon/favicon.ico
  medium: /resources/favicon/favicon-32.png
  apple_touch_icon: /resources/favicon/apple-touch-icon.png
  safari_pinned_tab: ''
  android_manifest: ''

# 文章原创声明
# Creative Commons 4.0 International License.
# See: https://creativecommons.org/about/cclicenses/
# Available values of license: by | by-nc | by-nc-nd | by-nc-sa | by-nd | by-sa | zero
# You can set a language value if you prefer a translated version of CC license, e.g. deed.zh
# CC licenses are available in 39 languages, you can find the specific and correct abbreviation you need on https://creativecommons.org
creative_commons:
  license: by-nc-sa
  sidebar: false
  post: true
  language: deed.zh


# ============================================================= #
# ======================= Menu Settings ======================= #
# ============================================================= #

menu:
  #life: /life/ || fas fa-pizza-slice
  #observer: /observer/ || fas fa-eye
  #notes: /notes/ || fas fa-book
  #culture: /culture/ || fas fa-guitar
  #album: /album/ || fas fa-camera-retro
  #guestbook: /guestbook/ || fas fa-splotch
  #  default: /guestbook/ || fas fa-splotch
  #  links: ../links/ || fas fa-link
  home: / || fa fa-home
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  #schedule: /schedule/ || fa fa-calendar
  #sitemap: /sitemap.xml || fa fa-sitemap
  #commonweal: /404/ || fa fa-heartbeat
  # Docs:
  #   default: /docs/ || fa fa-book
  #   Getting Started:
  #     default: /getting-started/ || fa fa-flag
  #     Installation: /installation.html || fa fa-download
  #     Configuration: /configuration.html || fa fa-wrench
  #   Third Party Services:
  #     default: /third-party-services/ || fa fa-puzzle-piece
  #     Math Equations: /math-equations.html || fa fa-square-root-alt
  #     Comment Systems: /comments.html || fa fa-comment-alt


# Enable / Disable menu icons / item badges.
menu_settings:
  icons: true
  badges: true

# ============================================================= #
# ===================== Sidebar Settings ====================== #
# ============================================================= #

avatar:
  url: /resources/img/avatar.webp
  rounded: true

site_state: false

social:
  GitHub: https://github.com/Chrunge || fab fa-github
  E-Mail: dqiucheng@gmail.com || fa fa-envelope
  bilibili: https://space.bilibili.com/39574700/ || fab fa-bilibili

social_icons:
  icons_only: true

toc:
  number: false
  wrap: true # 超出范围文字是否换行
  max_depth: 3 # <h3> ###
  expand_all: true


# ============================================================= #
# ====================== Footer Settings ====================== #
# ============================================================= #

footer:
  since: 2020
  icon:
    name: fas fa-heart
    animated: true
    color: "#f06292"
  copyright: Chrunge
  powered: false


# ============================================================= #
# ======================= Post Settings ======================= #
# ============================================================= #

read_more_btn: false

post_meta:
  item_text: false
  updated_at:
    enable: false

tag_icon: true

# Show previous post and next post in post footer if exists
post_navigation: right


# ============================================================= #
# ==================== Misc Theme Settings ==================== #
# ============================================================= #

preconnect: false

theme_color:
  light: "#e7ddc8"
  dark: "#181c27"


# ============================================================= #
# ======================= Font Settings ======================= #
# ============================================================= #

font:
  enable: true
  global:
    external: false
    family: LXGW WenKai Lite  # EB Garamond, Noto Serif SC
  title:
    external: false
    family: Long Cang
    size: 2.2
  headings:
    external: false
    size: 1.6
  codes:
    external: false
    family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace


# ============================================================= #
# =============== Third Party Services Settings =============== #
# ============================================================= #

# Math Formulas Render Support
# See: https://theme-next.js.org/docs/third-party-services/math-equations
math:
  mathjax:
    enable: true
    tags: ams
pjax: true
fancybox: true
lazyload: true
pangu: true

# Umami Analytics
# See: https://umami.is/
umami:
  enable: false
  script_url: 
  website_id: 

# Dependencies: https://github.com/next-theme/hexo-generator-searchdb
local_search:
  enable: false


# ============================================================= #
# ======================== Tag Plugins ======================== #
# ============================================================= #

# Note tag (bootstrap callout)
note:
  style: flat
  icons: true
  light_bg_offset: 0

# Tabs tag
tabs:
  sticky: true
  transition:
    tabs: true
    labels: true


# ============================================================= #
# ==================== Animation Services ===================== #
# ============================================================= #

motion:
  enable: false


# ============================================================= #
# ==================== External Libraries ===================== #
# ============================================================= #
# See: https://theme-next.js.org/docs/advanced-settings/vendors

vendors:
  # local | jsdelivr | unpkg | cdnjs | custom
  internal: custom
  plugins: custom
  custom_cdn_url: https://cdn.staticfile.org/${cdnjs_name}/${version}/${cdnjs_file} #七牛云 不支持latest 海外阿里云
  #custom_cdn_url: https://lib.baomitu.com/${cdnjs_name}/${version}/${cdnjs_file} #360 75CDN 海外亚马逊云
  #custom_cdn_url: https://jsd.pinlyu.com/npm/${npm_name}@${version}/${minified}


# Assets
# css - local
# js - only valid when vendors.internal is local
images: /resources/img/ # root /img/ folder


codeblock:
  # Code Highlight theme
  # All available themes: https://theme-next.js.org/highlight/
  theme:
    light: tomorrow-night-bright
    dark: tomorrow-night-bright
  # Add copy button on codeblock
  copy_button:
    enable: true
    # Available values: default | flat | mac
    style: mac


back2top:
  enable: true
  # Back to top in sidebar.
  sidebar: false
  # Scroll percent label in b2t button.
  scrollpercent: false


# Reading progress bar
reading_progress:
  enable: false
  # Available values: left | right
  startAt: left
  # Available values: top | bottom
  position: top
  reversed: false
  color: "#37c6c0"
  height: 3px


# Gitalk
# For more information: https://gitalk.github.io
gitalk:
  enable: false
  github_id: Chrunge
  repo: Chrunge.github.io/
  client_id: 
  client_secret: 
  admin_user: Chrunge # GitHub repo owner and collaborators, only these guys can initialize gitHub issues
  distraction_free_mode: true # Facebook-like distraction free mode
  # When the official proxy is not available, you can change it to your own proxy address
  proxy: https://cors-anywhere.azm.workers.dev/https://github.com/login/oauth/access_token # This is official proxy adress
  # Gitalk's display language depends on user's browser or system environment
  # If you want everyone visiting your site to see a uniform language, you can set a force language value
  # Available values: en | es-ES | fr | ru | zh-CN | zh-TW
  language: zh-CN